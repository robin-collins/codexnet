# CodexNet non-secret configuration schema v1. Copy outside Git for site-specific use.
schema_version: 1

interface:
  name: eth0
  allow_excluded_interface: false

active:
  # Empty is the safe default. Add only an explicitly authorised, directly connected range.
  approved_ranges:
    - 192.168.50.0/24
  max_hosts: 256
  # Outer wall-clock bound for an explicit invocation of the existing script.
  scan_timeout_seconds: 7200

paths:
  # Read-only input owned by the existing protected nmap process.
  nmap_results: /var/log/network-discovery
  # CodexNet-owned state. Maintenance refuses paths outside this real directory.
  data_root: /var/lib/field-discovery
  database: /var/lib/field-discovery/discovery.db

scheduler:
  interval_seconds: 3600
  jitter_seconds: 120
  timeout_seconds: 30
  retries: 1
  concurrency: 4

storage:
  # Pause reports, backups, and raw collector artifacts before they consume this reserve.
  minimum_free_bytes: 536870912
  minimum_free_percent: 10

secret_providers:
  appliance_env:
    type: env_file
    path: /etc/field-discovery/secrets.env
  # A command receives the reference key on stdin and returns one secret on stdout.
  # It is executed directly, without a shell or command-line secret.
  secret_helper:
    type: command
    executable: /usr/local/libexec/field-discovery-secret
    timeout_seconds: 5

collectors:
  snmp:
    enabled: false
    protocol: v3
    allow_insecure_v2c: false
    credential_ref:
      provider: appliance_env
      key: SNMP_SITE_PROFILE
  unifi:
    enabled: false
    endpoints:
      - url: https://unifi.example.invalid
        api_type: modern
        verify_tls: true
        allow_self_signed: false
        credential_ref:
          provider: appliance_env
          key: UNIFI_SITE_PROFILE
  ad:
    enabled: false
    transport: ldaps
    allow_plaintext_ldap: false
    domain: example.invalid
    base_dn: DC=example,DC=invalid
    server_name: dc1.example.invalid
    page_size: 500
    max_entries: 10000
    # Exact groups whose membership is required for documentation; empty collects none.
    documentation_groups:
      - Documentation
    credential_ref:
      provider: appliance_env
      key: AD_SITE_PROFILE
  ssh:
    enabled: false
    host_key_policy: strict
    credential_ref:
      provider: secret_helper
      key: SSH_SITE_PROFILE

report:
  # Customer-facing values are required before `report generate`; they are never inferred.
  customer_name: Example Customer
  site_name: Adelaide Office
  author: Example Technician
  company_name: Example MSP
  document_version: "1.0"
  confidentiality: Confidential
  # Optional self-contained DOCX whose styles are used after safety validation.
  template: null

retention:
  detailed_days: 30
  artifact_days: 30
  report_days: 30
  backup_days: 30
  diagnostic_capture_hours: 24
