# Optional drop-in for field-discovery-nmap-import.service.
# Install as /etc/systemd/system/field-discovery-nmap-import.service.d/report-refresh.conf
# only when report refresh after every import pass is desired. The leading "-"
# keeps reporting failure isolated from future artifact import passes.
[Service]
ExecStartPost=-/opt/field-discovery/venv/bin/field-discovery --config /etc/field-discovery/config.yaml report generate --format docx
